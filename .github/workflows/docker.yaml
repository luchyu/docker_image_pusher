name: Docker

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]


env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:

  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # 增加可用磁盘空间
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:

        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        # 如果空间还是不够用，可以把以下开启，清理出更多空间
        # remove-android: 'true'
        # remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image Aliyun
      run: |
        # 登录阿里云镜像仓库，失败则立即退出
        if ! docker login -u "${ALIYUN_REGISTRY_USER}" -p "${ALIYUN_REGISTRY_PASSWORD}" "${ALIYUN_REGISTRY}"; then
          echo "❌ Docker login failed"
          exit 1
        fi

        # 错误计数器
        error_count=0
        total_count=0
        success_count=0

        # 定义一个函数来处理单条镜像
        sync_image() {
            local line="$1"
            [[ -z "$line" ]] && return 0
            [[ "$line" =~ ^[[:space:]]*# ]] && return 0

            total_count=$((total_count + 1))

            # 提取 --platform 参数（如果有）
            local platform=""
            local platform_prefix=""
            if [[ "$line" =~ --platform[=[:space:]]+([^[:space:]]+) ]]; then
              platform="${BASH_REMATCH[1]}"
              platform_prefix="${platform//\//_}_"
              line="${line//--platform[=[:space:]]+[^[:space:]]+[[:space:]]*/}"
              line="${line//--platform[=[:space:]]+[^[:space:]]+$/}"
              line=$(echo "$line" | sed -E 's/--platform[=[:space:]]+[^[:space:]]+[[:space:]]*//g')
            fi

            local src_image="$line"
            # 去掉 @sha256 digest
            src_image="${src_image%%@*}"
            # 去除首尾空格
            src_image=$(echo "$src_image" | xargs)

            echo "📥 Pulling: $src_image"
            if ! docker pull "$src_image"; then
              echo "❌ Pull failed: $src_image"
              error_count=$((error_count + 1))
              return 1
            fi

            # 解析镜像各段（兼容 docker.io/library/nginx 等多级情况）
            # 统一去掉默认 registry 前缀，方便处理
            local ref="${src_image#docker.io/}"
            local path_part="${ref%:*}"
            local tag_part="${src_image##*:}"
            # 如果没有 tag，默认为 latest
            if [[ "$src_image" == "$tag_part" ]]; then
              tag_part="latest"
            fi

            # 用 / 替换为 . 作为安全拼接符（适配 ACR 二级目录限制）
            local safe_path="${path_part//\//.}"

            local target_image="${ALIYUN_REGISTRY}/${ALIYUN_NAME_SPACE}/${platform_prefix}${safe_path}:${tag_part}"

            echo "🏷️  Tagging: $target_image"
            if ! docker tag "$src_image" "$target_image"; then
              echo "❌ Tag failed: $src_image -> $target_image"
              error_count=$((error_count + 1))
              return 1
            fi

            echo "🚀 Pushing: $target_image"
            if ! docker push "$target_image"; then
              echo "❌ Push failed: $target_image"
              error_count=$((error_count + 1))
              return 1
            fi

            # 及时清理，释放磁盘
            if ! docker rmi "$src_image" "$target_image" 2>/dev/null; then
              echo "⚠️  Warning: Failed to clean up images $src_image, $target_image"
            fi

            success_count=$((success_count + 1))
            echo "✅ Done: $src_image -> $target_image"
            echo "---"
            return 0
        }

        # 逐行读取
        while IFS= read -r line || [[ -n "$line" ]]; do
          sync_image "$line"
        done < images.txt

        # 最终汇总
        echo "========================================"
        echo "🎉 Sync completed!"
        echo "Total images: $total_count"
        echo "Success: $success_count"
        echo "Failed: $error_count"
        echo "========================================"

        # 如果有错误，退出状态码为非零
        if [[ $error_count -gt 0 ]]; then
          echo "⚠️  Some images failed to sync"
          exit 1
        fi
